<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="theme-color" content="#0d0d1a"/>
  <title>Brick Clicker</title>
  <link rel="manifest" href="manifest.webmanifest"/>
  <link rel="icon" href="icons/icon-192.png"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d1a; overflow: hidden;
      font-family: system-ui, sans-serif; color: #eee; }
    #crosshair { position: fixed; top: 50%; left: 50%; width: 10px; height: 10px;
      margin: -5px 0 0 -5px; border-radius: 50%;
      background: rgba(255,255,255,.8); pointer-events: none; display: none; }

    /* ---- Mobile touch controls ---- */
    #joy-zone {
      display: none; position: fixed; bottom: 24px; left: 24px;
      width: 110px; height: 110px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.18);
      touch-action: none; z-index: 30;
    }
    #joy-knob {
      position: absolute; top: 50%; left: 50%; width: 44px; height: 44px;
      border-radius: 50%; background: rgba(255,255,255,.32);
      transform: translate(-50%,-50%); pointer-events: none;
    }
    #mob-floor-up, #mob-floor-dn {
      display: none; position: fixed; right: 20px;
      width: 52px; height: 52px; border-radius: 50%;
      background: rgba(30,30,80,.85); border: 2px solid rgba(255,255,255,.2);
      font-size: 22px; text-align: center; line-height: 50px;
      touch-action: none; z-index: 30; user-select: none;
    }
    #mob-floor-up { bottom: 100px; }
    #mob-floor-dn { bottom: 36px; }
    @media (pointer: coarse) {
      #joy-zone, #mob-floor-up, #mob-floor-dn { display: block; }
    }

    /* PC sidebar (hidden in VR via JS) */
    #sidebar {
      position: fixed; top: 0; right: 0; width: 200px; height: 100%;
      background: rgba(8,8,20,.85); backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255,255,255,.08);
      display: flex; flex-direction: column; gap: 10px;
      padding: 14px 10px; z-index: 20; overflow-y: auto;
    }
    #sidebar h2 { font-size: 11px; font-weight: 800; letter-spacing: .1em;
      text-transform: uppercase; color: rgba(255,255,255,.3); text-align: center; }
    .sb-stat { background: rgba(255,255,255,.06); border-radius: 10px;
      padding: 8px 10px; font-size: 12px; }
    .sb-stat .label { color: rgba(255,255,255,.4); font-size: 10px; }
    .sb-stat .val { font-weight: 800; color: #f5d020; font-size: 16px; }
    .sb-btn { all: unset; cursor: pointer; display: block; width: 100%;
      padding: 9px 10px; border-radius: 10px; font-size: 12px; font-weight: 700;
      text-align: center; color: #fff; transition: filter .1s, transform .1s; }
    .sb-btn:hover { filter: brightness(1.2); }
    .sb-btn:active { transform: scale(.96); }
    .sb-btn.prestige { background: #7b2ff7; }
    .sb-btn.rebirth  { background: #c0392b; }
    .sb-btn:disabled { opacity: .35; cursor: default; }
    .sb-divider { height: 1px; background: rgba(255,255,255,.08); }
    .sb-btn.save { background: #1a6b3a; font-size: 11px; }
    .sb-btn.load { background: #1a3b6b; font-size: 11px; }
    .sb-note { font-size: 9px; color: rgba(255,255,255,.3); text-align: center; }
    #version-label { position: fixed; bottom: 8px; right: 10px; font-size: 10px;
      color: rgba(255,255,255,.25); pointer-events: none; font-family: monospace; }
    /* floaters */
    .floater { position: fixed; pointer-events: none; font-weight: 800;
      font-size: 18px; color: #f5d020; text-shadow: 0 0 8px #f5d020;
      animation: floatUp .8s ease-out forwards; z-index: 99; }
    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    }
  </style>
</head>
<body>
  <div id="version-label">v0.35</div>
  <div id="crosshair"></div>
  <div id="joy-zone"><div id="joy-knob"></div></div>
  <div id="mob-floor-up">▲</div>
  <div id="mob-floor-dn">▼</div>
  <div id="sidebar">
    <h2>Stats</h2>
    <div class="sb-stat"><div class="label">c$</div><div class="val" id="s-cash">0</div></div>
    <div class="sb-stat"><div class="label">per second</div><div class="val" id="s-cps">0</div></div>
    <div class="sb-stat"><div class="label">Prestiges</div><div class="val" id="s-pres">0</div></div>
    <div class="sb-stat"><div class="label">Rebirths</div><div class="val" id="s-reb">0</div></div>
    <div class="sb-divider"></div>
    <h2>Ascend</h2>
    <button class="sb-btn prestige" id="btn-prestige" onclick="doPrestige()" disabled>⭐ Prestige</button>
    <div class="sb-note" id="pres-req">Earn c$10K total to unlock</div>
    <button class="sb-btn rebirth"  id="btn-rebirth"  onclick="doRebirth()"  disabled>🔥 Rebirth</button>
    <div class="sb-note" id="reb-req">Need 5 Prestiges</div>
    <div class="sb-divider"></div>
    <button class="sb-btn save" onclick="saveGame()">💾 Save</button>
    <button class="sb-btn load" onclick="loadGame()">📂 Load</button>
    <div class="sb-note" id="save-msg"></div>
  </div>

    function fmt(n) {
      if (n >= 1e12) return (n/1e12).toFixed(2) + 'T';
      if (n >= 1e9)  return (n/1e9).toFixed(2)  + 'B';
      if (n >= 1e6)  return (n/1e6).toFixed(2)  + 'M';
      if (n >= 1e3)  return (n/1e3).toFixed(1)  + 'K';
      return Math.floor(n).toString();

    const hitMilestones = new Set(); // track which ones already fired

    function checkMilestones() {
      for (const m of MILESTONES) {
        if (totalEarned >= m && !hitMilestones.has(m)) {
          hitMilestones.add(m);
          sendWebhook(`🧱 **Milestone hit!** Total earned: **c$${fmt(m)}**  ` +
            `(Prestiges: ${prestigeCount} | Rebirths: ${rebirthCount})`);

        if (m > totalEarned * 10) break; // don't loop all 94 entries every frame
      }

    function presMultiplier() {
      let m = 1;
      if (prestigeCount > 0) m *= Math.pow(1.5, prestigeCount);
      TREE_DEF.filter(u => u.type === 'pres_mult').forEach(u => {
        for (let i = 0; i < levels[u.id]; i++) m *= u.val;
      });
      return m;
    }
    function rebMultiplier() {
      let m = 1;
      if (rebirthCount > 0) m *= Math.pow(5, rebirthCount);
      TREE_DEF.filter(u => u.type === 'reb_mult').forEach(u => {
        for (let i = 0; i < levels[u.id]; i++) m *= u.val;
      });
      return m;
    }
    function globalMult() {
      let m = 1;
      TREE_DEF.filter(u => u.type === 'global_mult').forEach(u => {
        for (let i = 0; i < levels[u.id]; i++) m *= u.val;
      });
      return m * presMultiplier() * rebMultiplier();
    }
    function clickValue() {
      let base = 1;
      TREE_DEF.filter(u => u.type === 'click_add').forEach(u => { base += levels[u.id] * u.val; });
      TREE_DEF.filter(u => u.type === 'click_mult').forEach(u => {
        for (let i = 0; i < levels[u.id]; i++) base *= u.val;
      });
      return base * globalMult();
    }
    function autoRate() {
      let r = 0;
      TREE_DEF.filter(u => u.type === 'auto_add').forEach(u => { r += levels[u.id] * u.val; });
      TREE_DEF.filter(u => u.type === 'auto_click').forEach(u => {
        r += levels[u.id] * u.val * clickValue() * 0.1;
      });
      return r * globalMult();
    }
    function upgCost(u) {
      return u.baseCost * Math.pow(u.costMult, levels[u.id]);
    }
    function isUnlocked(u) {
      if (u.requirePres && prestigeCount < u.requirePres) return false;
      if (u.requireReb  && rebirthCount  < u.requireReb)  return false;
      if (!u.parent) return true;
      return levels[u.parent] > 0;

        brickColorIndex = d.brickColorIndex || 0;
        // Connector nodes always stay at 1
        TREE_DEF.filter(u => u.type === 'none').forEach(u => { levels[u.id] = 1; });
        // Restore hit milestones so we don't re-fire them on load
        MILESTONES.forEach(m => { if (totalEarned >= m) hitMilestones.add(m); });

    // ---- MOUNTAIN TERRAIN — Blocky Roblox-style mountain ----
    function makeMountain() {
      const mountainGroup = new THREE.Group();
      const blockSize = 1.0;
      const mountainMat = new THREE.MeshStandardMaterial({
        color: 0x7a8a8a,
        roughness: 0.8,
        metalness: 0.05
      });

      // Create stepped pyramid mountain matching node heights
      for (let layer = 0; layer < 10; layer++) {
        const layerWidth = 25 - layer * 2.5;
        const layerY = layer * blockSize;
        const layerZ = -16 - layer * 2.5; // match tree depth

        // Create full layer with multiple blocks along z
        for (let x = -layerWidth / 2; x < layerWidth / 2; x += blockSize) {
          for (let z = 0; z < 3; z++) {
            const blockGeo = new THREE.BoxGeometry(blockSize, blockSize, blockSize);
            const block = new THREE.Mesh(blockGeo, mountainMat);
            block.position.set(x, layerY, layerZ - z * blockSize);
            block.castShadow = true;
            block.receiveShadow = true;
            mountainGroup.add(block);
          }
        }
      }

      scene.add(mountainGroup);
      return mountainGroup;
    }

    // ---- Roblox-style trees ----
    function makeTree(x, z, floorY, scale) {
      scale = scale || 1;
      const group = new THREE.Group();
      group.position.set(x, floorY, z);

      // Trunk — brown box with studs
      const trunkH = 0.7 * scale;
      const trunkW = 0.22 * scale;
      const trunkMat = new THREE.MeshStandardMaterial({
        color: 0xa0622d,
        roughness: 0.8,
        metalness: 0.02
      });

      trunk.position.y = trunkH / 2;
      trunk.castShadow = true;
      group.add(trunk);

      // Foliage — 2-3 stacked green boxes, getting smaller toward top
      const leafMat = new THREE.MeshStandardMaterial({
        color: 0x4dbb4d,
        roughness: 0.6,
        metalness: 0.05,
        emissive: 0x2d8a2d,
        emissiveIntensity: 0.15
      });
      const darkLeafMat = new THREE.MeshStandardMaterial({
        color: 0x3aaa3a,
        roughness: 0.65,
        metalness: 0.05,
        emissive: 0x1f6b1f,
        emissiveIntensity: 0.1
      });
      const studMat = new THREE.MeshStandardMaterial({
        color: 0x5bcc5b,
        roughness: 0.5,
        metalness: 0.1
      });
      const studGeo = new THREE.CylinderGeometry(0.06 * scale, 0.06 * scale, 0.05 * scale, 10);

      const layers = [
        { w: 0.82 * scale, h: 0.28 * scale, y: trunkH + 0.14 * scale, mat: leafMat,     studs: 3 },
        { w: 0.62 * scale, h: 0.26 * scale, y: trunkH + 0.38 * scale, mat: darkLeafMat, studs: 2 },
        { w: 0.42 * scale, h: 0.24 * scale, y: trunkH + 0.60 * scale, mat: leafMat,     studs: 1 },
      ];

      layers.forEach(l => {
        const box = new THREE.Mesh(new THREE.BoxGeometry(l.w, l.h, l.w), l.mat);
        box.position.y = l.y;
        box.castShadow = true;
        group.add(box);
        // Studs on top of each layer
        for (let sx = -l.studs + 1; sx <= l.studs - 1; sx += 2) {
          for (let sz = -l.studs + 1; sz <= l.studs - 1; sz += 2) {

            stud.position.set(sx * 0.18 * scale, l.y + l.h / 2 + 0.025 * scale, sz * 0.18 * scale);
            group.add(stud);
          }
        }
      });

      scene.add(group);
      return group;

    const STUD_R = 0.085, STUD_H = 0.065, STUD_SEG = 14;

    function makeBrick(cols, rows, color, small) {
      const group = new THREE.Group();
      const mat = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.25,
        metalness: 0.15,
        emissive: new THREE.Color(color).multiplyScalar(0.3),
        emissiveIntensity: 0.3
      });

      let w, h, d;
      if (small) {
        // Upgrade nodes: rectangles (2x wide, 1 tall, 0.8 deep)
        w = 0.5;
        h = 0.25;
        d = 0.2;
      } else {
        // Main brick: cube based on cols/rows
        const sc = 1;
        w = cols * UNIT * sc;
        d = rows * UNIT * sc;
        h = BRICK_H * sc;
      }

      const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
      body.castShadow = true; body.receiveShadow = true;
      group.add(body);
      return group;
    }

    // ---- Main brick (floating in air) ----
    let brickGroup = null;
    const BRICK_POS = new THREE.Vector3(0, 3.5, 1.2); // floating high in the air
    function rebuildBrick() {
      if (brickGroup) scene.remove(brickGroup);
      brickGroup = makeBrick(brickCols, brickRows, BRICK_COLORS[brickColorIndex % BRICK_COLORS.length], false);
      brickGroup.position.copy(BRICK_POS);
      brickGroup.position.y = BRICK_H / 2;
      scene.add(brickGroup);
    }
    rebuildBrick();

    function getBrickMeshes() {
      const m = []; brickGroup.traverse(o => { if (o.isMesh) m.push(o); }); return m;
    }

    // ================================================================
    // UPGRADE TREE LAYOUT & 3D BRICKS
    // ================================================================
    // Layout: tree grows along +X (depth), spread along Z
    // Root (main brick) is at X=0. Each depth tier is spaced 1.8m apart.
    // Siblings are spread along Z.

    const DEPTH_SPACING = 1.9;   // grows along -Z (forward from player)
    const VERT_SPACING  = 1.0;   // spreads along X
    // Floor Y offsets per branch group
    const BRANCH_FLOOR = { root:0, click:0, auto:0, mult:0, special:0, prestige:7, rebirth:14 };
    const BRANCH_OFFSETS = { root:0, click:-5, auto:-1.5, mult:2, special:5.5, prestige:0, rebirth:0 };

    function buildPositions() {
      const pos = {};
      const byParent = {};
      TREE_DEF.forEach(u => {
        const key = u.parent || '__root__';
        if (!byParent[key]) byParent[key] = [];
        byParent[key].push(u);
      });

      // 1. Compute the leaf-count of each subtree (used as its width)
      function subtreeWidth(u) {
        const children = byParent[u.id] || [];
        if (children.length === 0) return 1;
        return children.reduce((sum, c) => sum + subtreeWidth(c), 0);
      }

      // 2. Place nodes: x spreads by subtree width, z grows with depth
      function place(u, depth, xLeft) {
        let floorY = BRANCH_FLOOR[u.branch] || 0;
        const z = -(depth * DEPTH_SPACING + (u.id === 'root' ? 0 : 2.5));

        // Prestige/rebirth nodes climb the mountain
        if (u.branch === 'prestige' || u.branch === 'rebirth') {
          floorY = mountainHeightAt(z);
        }

        const children = byParent[u.id] || [];
        const w = subtreeWidth(u);
        const xCenter = xLeft + w / 2;
        pos[u.id] = { x: xCenter * VERT_SPACING, y: floorY, z };

        let cursor = xLeft;
        children.forEach(c => {
          const cw = subtreeWidth(c);
          place(c, depth + 1, cursor);
          cursor += cw;
        });
      }

      const root = TREE_DEF.find(u => u.id === 'root');
      const rootWidth = subtreeWidth(root);
      place(root, 0, -rootWidth / 2); // center the whole tree at x=0
      return pos;
    }

    const nodePositions = buildPositions();

    // 3D upgrade bricks in scene
    const nodeMeshes = {}; // id -> { group, meshes, labelTex, labelCtx }
    const nodeLines  = []; // THREE.Line for connections

    function makeLabel(u) {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 128;
      const ctx = c.getContext('2d');
      return { canvas: c, ctx };
    }

    function drawLabel(ctx, canvas, u, canAfford) {
      ctx.clearRect(0, 0, 256, 128);
      const col = '#' + u.color.toString(16).padStart(6,'0');
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.roundRect(2, 2, 252, 124, 10);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 22px system-ui';
      ctx.fillText(u.name, 8, 30);
      ctx.font = '14px system-ui';
      ctx.fillStyle = 'rgba(255,255,255,.7)';
      ctx.fillText(u.desc, 8, 52);
      const lvl = levels[u.id];
      const maxed = lvl >= u.maxLvl;
      ctx.font = 'bold 18px system-ui';
      ctx.fillStyle = maxed ? '#aaa' : (canAfford ? '#f5d020' : '#ff6b6b');
      ctx.fillText(maxed ? 'MAXED' : 'c$' + fmt(upgCost(u)), 8, 76);
      ctx.fillStyle = 'rgba(255,255,255,.4)';
      ctx.font = '13px system-ui';
      ctx.fillText('Lv ' + lvl + '/' + u.maxLvl, 8, 100);
      if (u.requirePres) ctx.fillText('⭐ Pres.' + u.requirePres + ' req', 100, 100);
      if (u.requireReb)  ctx.fillText('🔥 Reb.' + u.requireReb + ' req', 100, 100);
    }

    function buildTreeMeshes() {
      // Clear old
      Object.values(nodeMeshes).forEach(n => scene.remove(n.group));
      for (const id in nodeMeshes) delete nodeMeshes[id];
      nodeLines.forEach(l => scene.remove(l));
      nodeLines.length = 0;

      TREE_DEF.forEach(u => {
        const p = nodePositions[u.id];
        if (!p) return;

        const group = makeBrick(1, 1, u.color, true);
        group.position.set(p.x, p.y + BRICK_H * 0.55 / 2, p.z);
        group.rotation.y = Math.random() * 0.3 - 0.15;

        // Label plane
        const { canvas, ctx } = makeLabel(u);
        drawLabel(ctx, canvas, u, false);
        const tex = new THREE.CanvasTexture(canvas);
        const plane = new THREE.Mesh(
          new THREE.PlaneGeometry(0.38, 0.19),
          new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false })
        );
        plane.position.set(0, BRICK_H * 0.55 + 0.14, 0);
        plane.rotation.y = group.rotation.y; // face same way as brick
        group.add(plane);

        const meshes = [];
        group.traverse(o => { if (o.isMesh && o !== plane) meshes.push(o); });

        scene.add(group);
        nodeMeshes[u.id] = { group, meshes, tex, ctx, canvas, plane };

        // Connection line to parent — store on nodeMeshes for recoloring
        if (u.parent && nodePositions[u.parent]) {
          const pp = nodePositions[u.parent];
          const pts = [
            new THREE.Vector3(pp.x, pp.y + 0.05, pp.z),
            new THREE.Vector3(p.x,  p.y  + 0.05, p.z)
          ];
          const mat = new THREE.LineBasicMaterial({ color: 0x444466, opacity: 0.7, transparent: true });
          const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
          scene.add(line);
          nodeLines.push(line);
          nodeMeshes[u.id].parentLine = { line, mat }; // for recoloring
        }
        if (!u.parent) {
          const pts = [
            new THREE.Vector3(0, 0.05, 0),
            new THREE.Vector3(p.x, p.y + 0.05, p.z)
          ];
          const mat = new THREE.LineBasicMaterial({ color: 0x334455, opacity: 0.5, transparent: true });
          const line = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
          scene.add(line);
          nodeLines.push(line);
          nodeMeshes[u.id].parentLine = { line, mat };
        }
      });
    }
    buildTreeMeshes();

    function refreshTree() {
      TREE_DEF.forEach(u => {
        const nm = nodeMeshes[u.id];
        if (!nm) return;
        const unlocked = isUnlocked(u);
        const bought   = levels[u.id] > 0;
        const maxed    = levels[u.id] >= u.maxLvl;
        const canAfford = cash >= upgCost(u) && !maxed && unlocked;

        drawLabel(nm.ctx, nm.canvas, u, canAfford);
        nm.tex.needsUpdate = true;

        // Node opacity
        nm.group.traverse(o => {
          if (o.isMesh && o !== nm.plane) {
            o.material.opacity = unlocked ? 1 : 0.18;
            o.material.transparent = !unlocked;
          }
        });

        // Line color:
        //  green  = parent bought → this node accessible
        //  yellow = can afford right now
        //  white  = maxed
        //  grey   = locked
        if (nm.parentLine) {
          const { mat } = nm.parentLine;
          if (maxed)        { mat.color.setHex(0xffffff); mat.opacity = 1.0; }
          else if (bought)  { mat.color.setHex(0x44ff66); mat.opacity = 0.9; }
          else if (canAfford){ mat.color.setHex(0xf5d020); mat.opacity = 0.9; }
          else if (unlocked){ mat.color.setHex(0x226633); mat.opacity = 0.6; }
          else              { mat.color.setHex(0x333344); mat.opacity = 0.3; }
        }
      });
    }

    function getAllUpgradeMeshes() {
      const arr = [];
      Object.values(nodeMeshes).forEach(n => arr.push(...n.meshes));
      return arr;
    }

    // ================================================================
    // FLOATING BILLBOARD HUD
    // ================================================================
    const billCanvas = document.createElement('canvas');
    billCanvas.width = 512; billCanvas.height = 256;
    const billCtx = billCanvas.getContext('2d');
    const billTex = new THREE.CanvasTexture(billCanvas);
    const billboard = new THREE.Mesh(
      new THREE.PlaneGeometry(1.2, 0.6),
      new THREE.MeshBasicMaterial({ map: billTex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
    );
    // Follow player: attach to player group, offset ahead and up
    billboard.position.set(0, 2.4, -1.5);
    player.add(billboard);

    function updateBillboard() {
      billCtx.clearRect(0, 0, 512, 256);
      billCtx.fillStyle = 'rgba(10,10,30,0.82)';
      billCtx.beginPath();
      billCtx.roundRect(4, 4, 504, 248, 20);
      billCtx.fill();
      billCtx.fillStyle = '#f5d020';
      billCtx.font = 'bold 52px system-ui';
      billCtx.fillText('c$' + fmt(cash), 20, 70);
      const cps = autoRate();
      if (cps > 0) {
        billCtx.fillStyle = 'rgba(255,255,255,.55)';
        billCtx.font = '28px system-ui';
        billCtx.fillText(fmt(cps) + '/sec', 20, 110);
      }
      billCtx.fillStyle = '#d2b4de';
      billCtx.font = 'bold 26px system-ui';
      billCtx.fillText('⭐ ' + prestigeCount + '  🔥 ' + rebirthCount, 20, 155);
      billCtx.fillStyle = 'rgba(255,255,255,.35)';
      billCtx.font = '20px system-ui';
      billCtx.fillText('Total: c$' + fmt(totalEarned), 20, 190);
      const pm = presMultiplier(), rm = rebMultiplier();
      if (pm > 1 || rm > 1) {
        billCtx.fillText('Mult: ×' + fmt(pm * rm), 20, 216);
      }
      billTex.needsUpdate = true;
    }

    // ================================================================
    // HUD (PC sidebar)
    // ================================================================
    function updateAll() {
      const sCash = document.getElementById('s-cash');
      const sCps  = document.getElementById('s-cps');
      const sPres = document.getElementById('s-pres');
      const sReb  = document.getElementById('s-reb');
      const btnPres = document.getElementById('btn-prestige');
      const btnReb  = document.getElementById('btn-rebirth');
      const presReq = document.getElementById('pres-req');
      const rebReq  = document.getElementById('reb-req');
      if (sCash) sCash.textContent = fmt(cash);
      if (sCps)  sCps.textContent  = fmt(autoRate()) + '/s';
      if (sPres) sPres.textContent = prestigeCount;
      if (sReb)  sReb.textContent  = rebirthCount;
      if (btnPres) btnPres.disabled = !canPrestige();
      if (btnReb)  btnReb.disabled  = !canRebirth();
      if (presReq) presReq.textContent = canPrestige() ? 'Ready!' : 'Need c$' + fmt(PRESTIGE_THRESHOLD) + ' total';
      if (rebReq)  rebReq.textContent  = canRebirth()  ? 'Ready!' : prestigeCount + '/' + REBIRTH_THRESHOLD + ' prestiges';
      refreshTree();
    }

    // ================================================================
    // CLICK / EARN
    // ================================================================
    function onBrickHit(sx, sy) {
      const v = clickValue();
      cash += v; totalEarned += v;
      checkMilestones();
      updateAll();
      if (sx !== undefined) spawnFloater(v, sx, sy);
      brickGroup.scale.setScalar(1.08);
      // Brick color upgrades
      TREE_DEF.filter(u => u.type === 'brick_grow').forEach(u => {
        const tgt = 2 + Math.floor(
          TREE_DEF.filter(u2 => u2.type === 'brick_grow')
            .reduce((acc, u2) => acc + levels[u2.id] * u2.val, 0)
        );
        if (brickCols !== tgt) { brickCols = brickRows = tgt; rebuildBrick(); }
      });
    }

    function spawnFloater(amount, x, y) {
      const el = document.createElement('div');
      el.className = 'floater';
      el.textContent = '+c$' + fmt(amount);
      el.style.left = (x - 30) + 'px';
      el.style.top  = (y - 20) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function buyUpgrade(u) {
      if (u.type === 'none') return; // hub/trunk nodes not purchasable
      if (!isUnlocked(u)) return;
      const cost = upgCost(u);
      if (cash < cost || levels[u.id] >= u.maxLvl) return;
      cash -= cost;
      levels[u.id]++;
      // Apply effects
      if (u.type === 'brick_grow') {
        const total = TREE_DEF.filter(u2 => u2.type === 'brick_grow')
          .reduce((acc, u2) => acc + levels[u2.id] * u2.val, 0);
        brickCols = brickRows = 2 + Math.floor(total);
        rebuildBrick();
      }
      updateAll();
      // Pop animation
      const nm = nodeMeshes[u.id];
      if (nm) nm.group.scale.setScalar(1.2);
    }

    // ================================================================
    // RAYCASTING
    // ================================================================
    const raycaster = new THREE.Raycaster();
    const tempMatrix = new THREE.Matrix4();

    // ================================================================
    // VR CONTROLLERS & HANDS
    // ================================================================
    const controllerModelFactory = new XRControllerModelFactory();
    const handModelFactory = new XRHandModelFactory();
    const controllers = [];

    renderer.xr.addEventListener('sessionstart', () => {
      document.getElementById('sidebar').style.display = 'none';
      billboard.visible = true;
    });
    renderer.xr.addEventListener('sessionend', () => {
      document.getElementById('sidebar').style.display = '';
      billboard.visible = false;
    });
    billboard.visible = false; // hide on PC by default

    function buildController(index) {
      const ctrl = renderer.xr.getController(index);
      const lineGeo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-1)
      ]);
      const line = new THREE.Line(lineGeo,
        new THREE.LineBasicMaterial({ color: 0xffffff, opacity: .4, transparent: true }));
      line.scale.z = 5;
      ctrl.add(line);

      ctrl.addEventListener('selectstart', () => {
        tempMatrix.identity().extractRotation(ctrl.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
        raycaster.ray.direction.set(0,0,-1).applyMatrix4(tempMatrix);

        // Main brick
        const bHits = raycaster.intersectObjects(getBrickMeshes(), false);
        if (bHits.length) { onBrickHit(); return; }

        // Action bricks (save/load/prestige/rebirth)
        if (checkActionBricks()) return;

        // Upgrade bricks
        for (const u of TREE_DEF) {
          const nm = nodeMeshes[u.id];
          if (!nm) continue;
          const hits = raycaster.intersectObjects(nm.meshes, false);
          if (hits.length) { buyUpgrade(u); return; }
        }
      });

      player.add(ctrl);
      const grip = renderer.xr.getControllerGrip(index);
      grip.add(controllerModelFactory.createControllerModel(grip));
      player.add(grip);
      const hand = renderer.xr.getHand(index);
      hand.add(handModelFactory.createHandModel(hand, 'mesh'));
      player.add(hand);
      controllers.push(ctrl);
    }
    buildController(0);
    buildController(1);

    // ================================================================
    // PC CONTROLS
    // ================================================================
    const controls  = new PointerLockControls(camera, renderer.domElement);
    const crosshair = document.getElementById('crosshair');
    const keys = {};
    const screenC = new THREE.Vector2(0, 0);
    const SPEED = 1.6;

    controls.addEventListener('lock',   () => { crosshair.style.display = 'block'; billboard.visible = true; });
    controls.addEventListener('unlock', () => { crosshair.style.display = 'none';  billboard.visible = false; });

    addEventListener('keydown', e => { keys[e.code] = true; });
    addEventListener('keyup',   e => { keys[e.code] = false; });

    renderer.domElement.addEventListener('click', () => {
      if (renderer.xr.isPresenting) return;
      if (!controls.isLocked) { controls.lock(); return; }
      raycaster.setFromCamera(screenC, camera);
      // Main brick
      const bHits = raycaster.intersectObjects(getBrickMeshes(), false);
      if (bHits.length) {
        const p = bHits[0].point.clone().project(camera);
        onBrickHit((.5 + p.x * .5) * innerWidth, (.5 - p.y * .5) * innerHeight);
        return;
      }
      // Upgrades
      const uMeshes = getAllUpgradeMeshes();
      const uHits = raycaster.intersectObjects(uMeshes, false);
      if (uHits.length) {
        const hit = uHits[0].object;
        for (const u of TREE_DEF) {
          const nm = nodeMeshes[u.id];
          if (nm && nm.meshes.includes(hit)) { buyUpgrade(u); return; }
        }
      }
    });

    function pcUpdate(dt) {
      if (renderer.xr.isPresenting || !controls.isLocked) return;
      const s = SPEED * dt;
      if (keys['KeyW']||keys['ArrowUp'])    controls.moveForward(s);
      if (keys['KeyS']||keys['ArrowDown'])  controls.moveForward(-s);
      if (keys['KeyA']||keys['ArrowLeft'])  controls.moveRight(-s);
      if (keys['KeyD']||keys['ArrowRight']) controls.moveRight(s);
      if (keys['KeyQ'] && onGround) { playerVel.y = 6; } // jump
    }

    // ================================================================
    // VR LOCOMOTION
    // ================================================================
    const fwd = new THREE.Vector3(), right = new THREE.Vector3();
    const headQ = new THREE.Quaternion(), headP = new THREE.Vector3();
    let canTurn = true;
    const TURN = Math.PI / 6, DEAD = 0.2;

    // ---- Physics: gravity + floor collision (all platforms) -------------
    const GT_STRENGTH  = 2.8;
    const GT_GRAVITY   = 14;    // m/s²
    const GT_FRICTION  = 0.82;  // horizontal damping per frame
    const playerVel    = new THREE.Vector3();
    const gripPrev     = [null, null];
    const gripCur      = [new THREE.Vector3(), new THREE.Vector3()];
    let   onGround     = false;

    function floorYAt(py) {
      if (py > 10.5) return 14;
      if (py > 3.5)  return 7;
      return 0;
    }

    // Mountain height at z position (for nodes on mountain to climb)
    function mountainHeightAt(z) {
      // Mountain goes from z=-16 backwards, climbing from y=0 to y=10
      const relZ = Math.max(0, z + 16); // distance from mountain base
      const heightFraction = Math.max(0, 1 - relZ / 25); // climb over 25 units
      return heightFraction * 10; // peak at y=10
    }

    // Called every frame regardless of platform
    function applyPhysics(dt) {
      // Gravity
      playerVel.y -= GT_GRAVITY * dt;

      // Apply velocity to position
      player.position.addScaledVector(playerVel, dt);

      // Floor collision
      const floorY = floorYAt(player.position.y);
      if (player.position.y <= floorY + 0.01) {
        player.position.y = floorY;
        if (playerVel.y < 0) playerVel.y = 0;
        onGround = true;
      } else {
        onGround = false;
      }

      // Horizontal friction (only on ground)
      if (onGround) {
        playerVel.x *= GT_FRICTION;
        playerVel.z *= GT_FRICTION;
      }
    }

    renderer.xr.addEventListener('sessionend', () => {
      playerVel.set(0, 0, 0);
    });

    function vrLocomotion(dt) {
      const session = renderer.xr.getSession();
      if (!session) return;
      for (const src of session.inputSources) {
        if (!src.gamepad || !src.handedness) continue;
        const ax = src.gamepad.axes;
        const x = ax.length > 2 ? ax[2] : ax[0];
        const y = ax.length > 3 ? ax[3] : ax[1];
        const btns = src.gamepad.buttons;

        // Jump on grip button (button 4 & 5 are left/right grip)
        const gripBtn = src.handedness === 'left' ? btns[4] : btns[5];
        if (gripBtn && gripBtn.pressed && onGround) {
          playerVel.y = 6;
        }

        if (src.handedness === 'left') {
          if (Math.abs(x) < DEAD && Math.abs(y) < DEAD) continue;
          camera.getWorldQuaternion(headQ);
          fwd.set(0,0,-1).applyQuaternion(headQ); fwd.y=0; fwd.normalize();
          right.set(1,0,0).applyQuaternion(headQ); right.y=0; right.normalize();
          // Add to velocity so gravity still applies
          playerVel.addScaledVector(fwd,  -y * SPEED * 2);
          playerVel.addScaledVector(right,  x * SPEED * 2);
        } else if (src.handedness === 'right') {
          if (Math.abs(x) < 0.6) { canTurn = true; continue; }
          if (!canTurn) continue;
          canTurn = false;
          camera.getWorldPosition(headP);
          player.position.sub(headP);
          const a = x > 0 ? -TURN : TURN;
          player.position.applyAxisAngle(new THREE.Vector3(0,1,0), a);
          player.position.add(headP);
          player.rotateY(a);
        }
      }
    }

    // ================================================================
    // HOVER HIGHLIGHT
    // ================================================================
    let lastHover = null;
    function updateHover() {
      if (renderer.xr.isPresenting) return;
      raycaster.setFromCamera(screenC, camera);
      const hits = raycaster.intersectObjects([...getBrickMeshes(), ...getAllUpgradeMeshes()], false);
      const newHover = hits.length ? hits[0].object : null;
      if (newHover !== lastHover) {
        if (lastHover) lastHover.material.emissive?.setHex(0x000000);
        if (newHover)  newHover.material.emissive?.setHex(0x223344);
        lastHover = newHover;
      }
    }

    // ================================================================
    // SPRING ANIMATIONS
    // ================================================================
    function springs(dt) {
      function spring(group) {
        const s = group.scale.x;
        if (Math.abs(s - 1) > 0.001)
          group.scale.setScalar(s + (1 - s) * Math.min(1, dt * 13));
      }
      if (brickGroup) spring(brickGroup);
      Object.values(nodeMeshes).forEach(n => spring(n.group));
      [vrSaveBrick, vrLoadBrick, vrPrestigeBrick, vrRebirthBrick, vrResetBrick].forEach(b => spring(b.group));

      // Billboard always faces camera
      if (billboard.visible) {
        billboard.quaternion.copy(camera.quaternion);
      }
    }

    // ================================================================
    // RENDER LOOP
    // ================================================================
    const clock = new THREE.Clock();
    let refreshCounter = 0;
    // ================================================================
    // VR SAVE / LOAD BRICKS
    // ================================================================
    function makeActionBrick(label, color, x, y, z) {
      const g = makeBrick(1, 1, color, true);
      g.position.set(x, y, z);
      scene.add(g);
      // Label plane
      const c = document.createElement('canvas'); c.width = 256; c.height = 128;
      const ctx = c.getContext('2d');
      ctx.fillStyle = '#' + color.toString(16).padStart(6,'0');
      ctx.fillRect(0,0,256,128);
      ctx.fillStyle='#fff'; ctx.font='bold 40px system-ui'; ctx.textAlign='center';
      ctx.fillText(label, 128, 76);
      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(0.36, 0.18),
        new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true })
      );
      plane.position.set(0, BRICK_H * 0.55 + 0.12, 0);
      g.add(plane);
      const meshes = [];
      g.traverse(o => { if (o.isMesh && o !== plane) meshes.push(o); });
      return { group: g, meshes };
    }

    // Place save/load bricks floating beside the player start area
    const vrSaveBrick     = makeActionBrick('💾 Save',    0x1a6b3a, -1.8, BRICK_H * 0.55 / 2, 1.2);
    const vrLoadBrick     = makeActionBrick('📂 Load',    0x1a3b6b,  1.8, BRICK_H * 0.55 / 2, 1.2);
    const vrPrestigeBrick = makeActionBrick('⭐ Prestige', 0x7b2ff7, -1.8, BRICK_H * 0.55 / 2, 2.2);
    const vrRebirthBrick  = makeActionBrick('🔥 Rebirth',  0xc0392b,  1.8, BRICK_H * 0.55 / 2, 2.2);
    const vrResetBrick    = makeActionBrick('🗑️ Reset',    0x555555,   0,  BRICK_H * 0.55 / 2, 2.8);

    // Pulse them
    let actionPulse = 0;
    function pulseActionBricks(dt) {
      actionPulse += dt * 2;
      const si = 0.9 + Math.sin(actionPulse) * 0.06;
      [vrSaveBrick, vrLoadBrick, vrPrestigeBrick, vrRebirthBrick, vrResetBrick].forEach(b => {
        b.group.traverse(o => {
          if (o.isMesh && o.material.emissive) o.material.emissive.setScalar(Math.sin(actionPulse) * 0.1 + 0.05);
        });
      });
    }

    // Add action brick raycasting to VR controller selectstart
    // (patch into existing controller logic via a shared function)
    function checkActionBricks() {
      const bricks = [
        { b: vrSaveBrick,     fn: () => { saveGame(); vrSaveBrick.group.scale.setScalar(1.2); } },
        { b: vrLoadBrick,     fn: () => { loadGame(); vrLoadBrick.group.scale.setScalar(1.2); } },
        { b: vrPrestigeBrick, fn: () => { doPrestige(); vrPrestigeBrick.group.scale.setScalar(1.2); } },
        { b: vrRebirthBrick,  fn: () => { doRebirth();  vrRebirthBrick.group.scale.setScalar(1.2); } },
      { b: vrResetBrick,    fn: () => {
          // Double-trigger to confirm: first press arms it, second press fires
          if (!vrResetBrick._armed) {
            vrResetBrick._armed = true;
            vrResetBrick._armTimer = setTimeout(() => { vrResetBrick._armed = false; }, 3000);
          } else {
            clearTimeout(vrResetBrick._armTimer);
            vrResetBrick._armed = false;
            localStorage.removeItem('brickclicker');
            location.reload();
          }
          vrResetBrick.group.scale.setScalar(1.2);
        }
      },
      ];
      for (const { b, fn } of bricks) {
        const hits = raycaster.intersectObjects(b.meshes, false);
        if (hits.length) { fn(); return true; }
      }
      return false;
    }

    // ================================================================
    // MOBILE TOUCH CONTROLS
    // ================================================================
    const joyZone = document.getElementById('joy-zone');
    const joyKnob = document.getElementById('joy-knob');
    const JOY_R   = 55;
    let joyTouch = null, joyDx = 0, joyDy = 0;
    let lookTouch = null, lookPrevX = 0, lookPrevY = 0;
    const LOOK_SENS = 0.003;
    const headQM = new THREE.Quaternion();
    const fwdM = new THREE.Vector3(), rightM = new THREE.Vector3();

    document.getElementById('mob-floor-up').addEventListener('touchstart', e => {
      e.preventDefault(); playerVel.y = 14; // big jump to reach next floor
    }, { passive: false });
    document.getElementById('mob-floor-dn').addEventListener('touchstart', e => {
      e.preventDefault(); playerVel.y = -8; // push down to drop to lower floor
    }, { passive: false });

    addEventListener('touchstart', e => {
      if (renderer.xr.isPresenting) return;
      for (const t of e.changedTouches) {
        const r = joyZone.getBoundingClientRect();
        const inJoy = t.clientX >= r.left && t.clientX <= r.right &&
                      t.clientY >= r.top  && t.clientY <= r.bottom;
        if (inJoy && !joyTouch) {
          joyTouch = t.identifier;
        } else if (!lookTouch && !inJoy && !e.target.closest('#sidebar')) {
          lookTouch = t.identifier;
          lookPrevX = t.clientX; lookPrevY = t.clientY;
        }
      }
    }, { passive: true });

    addEventListener('touchmove', e => {
      if (renderer.xr.isPresenting) return;
      for (const t of e.changedTouches) {
        if (t.identifier === joyTouch) {
          const r = joyZone.getBoundingClientRect();
          const cx = r.left + r.width/2, cy = r.top + r.height/2;
          let dx = t.clientX - cx, dy = t.clientY - cy;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist > JOY_R) { dx *= JOY_R/dist; dy *= JOY_R/dist; }
          joyDx = dx/JOY_R; joyDy = dy/JOY_R;
          joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        }
        if (t.identifier === lookTouch) {
          const dx = t.clientX - lookPrevX, dy = t.clientY - lookPrevY;
          lookPrevX = t.clientX; lookPrevY = t.clientY;
          player.rotateY(-dx * LOOK_SENS);
          camera.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, camera.rotation.x - dy * LOOK_SENS));
        }
      }
    }, { passive: true });

    addEventListener('touchend', e => {
      for (const t of e.changedTouches) {
        if (t.identifier === joyTouch) {
          joyTouch = null; joyDx = 0; joyDy = 0;
          joyKnob.style.transform = 'translate(-50%,-50%)';
        }
        if (t.identifier === lookTouch) lookTouch = null;
      }
    });

    function mobileUpdate(dt) {
      if (renderer.xr.isPresenting || (joyDx === 0 && joyDy === 0)) return;
      camera.getWorldQuaternion(headQM);
      fwdM.set(0,0,-1).applyQuaternion(headQM); fwdM.y=0; fwdM.normalize();
      rightM.set(1,0,0).applyQuaternion(headQM); rightM.y=0; rightM.normalize();
      player.position.addScaledVector(fwdM,  -joyDy * SPEED * dt);
      player.position.addScaledVector(rightM,  joyDx * SPEED * dt);
    }

    renderer.setAnimationLoop(() => {
      const dt = Math.min(clock.getDelta(), 0.05);
      vrLocomotion(dt);
      pcUpdate(dt);
      mobileUpdate(dt);
      applyPhysics(dt);
      springs(dt);
      pulseActionBricks(dt);
      updateHover();
      updateBillboard();

      // Spinning brick
      if (brickGroup) {
        brickGroup.rotation.y += dt * 1.2; // spin constantly
        brickGroup.rotation.x += dt * 0.3; // gentle tilt
      }


      // Auto income
      autoAccum += dt;
      if (autoAccum >= 1) {
        const r = autoRate();
        if (r > 0) { cash += r; totalEarned += r; }
        autoAccum -= 1;
        refreshCounter++;
        if (refreshCounter >= 2) { updateAll(); refreshCounter = 0; }
        checkMilestones();
      }

      renderer.render(scene, camera);
    });

    // Init
    loadGame();
    updateAll();
    updateBillboard();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  </script>
</body>
</html>
